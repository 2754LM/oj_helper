name: Build Manual

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: "stable"
          cache: true
          cache-key: flutter-android

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17

      - name: Build Android APK
        run: flutter build apk --split-per-abi --release --obfuscate --split-debug-info=./split-debug-info --tree-shake-icons --shrink

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-dist
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: "stable"
          cache: true
          cache-key: flutter-windows

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Windows
        run: fastforge package --platform windows --targets zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.2"
          channel: "stable"
          cache: true
          cache-key: flutter-macos

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Install Fastforge
        run: dart pub global activate fastforge

      - name: Build macOS .zip
        run: |
          export PATH="$PATH":"$HOME/.pub-cache/bin"
          fastforge package --platform macos --targets zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/**/*.zip
